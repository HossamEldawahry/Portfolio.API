name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Portfolio.API.sln

      - name: Build
        run: dotnet build Portfolio.API.sln --configuration Release --no-restore

      - name: Test
        env:
          ConnectionStrings__WebConnection: Server=(localdb)\mssqllocaldb;Database=PortfolioApiCi;Trusted_Connection=True;TrustServerCertificate=True;
          Jwt__Issuer: Portfolio.API
          Jwt__Audience: Portfolio.Client
          Jwt__SecretKey: CI_SECRET_KEY_1234567890123456789012345
          AdminAccount__Username: admin
          AdminAccount__Password: admin12345
        run: dotnet test Portfolio.API.sln --configuration Release --no-build --verbosity normal
